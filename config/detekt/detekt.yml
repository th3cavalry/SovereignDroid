build:
  maxIssues: 100 # Temporarily increased to allow baseline build
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false

complexity:
  active: true
  ComplexCondition:
    active: true
    threshold: 5 # Increased from 4
  LongMethod:
    active: true
    threshold: 200 # Increased from 60
  LongParameterList:
    active: true
    functionThreshold: 10 # Increased from 6
    constructorThreshold: 10
  LargeClass:
    active: true
    threshold: 1000 # Increased from 600

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers:
      - "-1"
      - "0"
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
      - "10"
      - "20"
      - "30"
      - "60"
      - "100"
      - "200"
      - "500"
      - "1000"
      - "2000"
      - "4096"
      - "11434"
    ignoreAnnotation: false
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true # Set to true
    ignoreLocalVariableDeclaration: true # Set to true
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreEnums: true

naming:
  active: true
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
