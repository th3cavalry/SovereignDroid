name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (must match versionName in build.gradle.kts, e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  APP_NAME: Android-llm

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Determine tag name and create tag if needed
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            echo "name=${TAG}" >> "$GITHUB_OUTPUT"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            if ! git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
              git tag "${TAG}"
              git push origin "${TAG}"
            fi
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches versionName
        run: |
          TAG_VERSION="${{ steps.tag.outputs.name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          GRADLE_VERSION=$(grep 'versionName = ' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "Tag version:    $TAG_VERSION"
          echo "Gradle version: $GRADLE_VERSION"
          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "ERROR: Tag 'v$TAG_VERSION' does not match versionName '$GRADLE_VERSION'"
            exit 1
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          cp app/build/outputs/apk/debug/app-debug.apk \
             "app/build/outputs/apk/debug/${{ env.APP_NAME }}-${TAG}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "Android LLM ${{ steps.tag.outputs.name }}"
          prerelease: ${{ contains(steps.tag.outputs.name, 'alpha') || contains(steps.tag.outputs.name, 'beta') || contains(steps.tag.outputs.name, 'rc') }}
          body: |
            ## Android LLM ${{ steps.tag.outputs.name }}

            ### Installation
            Download the APK below and install on your Android device (Android 8.0+ / API 26+).
            > You need to enable **Install from unknown sources** in Settings first.

            ### Obtainium
            Add `https://github.com/${{ github.repository }}` in [Obtainium](https://github.com/ImranR98/Obtainium) for automatic updates.

            ### Changes
            See the [commit history](https://github.com/${{ github.repository }}/commits/${{ steps.tag.outputs.name }}) for details.
          files: |
            app/build/outputs/apk/debug/${{ env.APP_NAME }}-${{ steps.tag.outputs.name }}.apk

